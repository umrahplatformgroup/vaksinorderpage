<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pesanan - Klinik NLAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-brand { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); }
        /* Hide number input spinners */
        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield; /* Firefox */
        }
    </style>
</head>
<body class="bg-slate-100 flex justify-center min-h-screen text-slate-900">

    <!-- Container Utama -->
    <div class="w-full max-w-lg bg-slate-50 min-h-screen shadow-2xl relative flex flex-col border-x border-slate-200">
        
        <!-- Navbar -->
        <nav class="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-slate-100 px-5 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-900 p-1.5 rounded-lg shadow-sm">
                    <i data-lucide="microscope" class="text-white w-5 h-5"></i>
                </div>
                <div>
                    <span class="font-extrabold text-xl tracking-tighter text-blue-900">NLAB</span>
                    <span class="block text-[8px] font-bold text-slate-400 -mt-1 tracking-widest uppercase">Clinical Lab</span>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 px-5 py-8">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-2">Cek Riwayat Pesanan</h1>
            <p class="text-sm text-slate-500 mb-6">Masukkan 6 digit terakhir kode booking Anda untuk melihat detail pesanan.</p>

            <div class="flex gap-2 mb-8">
                <input 
                    type="number" 
                    id="bookingCodeInput"
                    placeholder="Contoh: 569271"
                    class="flex-1 w-full pl-5 pr-4 py-4 rounded-2xl bg-white text-slate-800 shadow-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all text-sm font-medium border-none"
                >
                <button id="checkHistoryBtn" class="px-6 py-4 bg-blue-900 text-white font-bold rounded-2xl shadow-xl shadow-blue-200 active:scale-[0.97] transition-all">
                    Cek
                </button>
            </div>

            <!-- Result Area -->
            <div id="historyResult" class="hidden">
                <!-- Details will be injected here -->
            </div>
            
            <!-- Error Message -->
            <div id="errorMessage" class="hidden bg-red-100 border border-red-200 text-red-700 px-4 py-3 rounded-2xl" role="alert">
                <strong class="font-bold">Gagal!</strong>
                <span class="block sm:inline">Kode booking tidak ditemukan.</span>
            </div>

        </main>

        <!-- Bottom Nav -->
        <div class="sticky bottom-0 bg-white/95 backdrop-blur-md border-t border-slate-100 px-8 py-4 flex justify-around items-center rounded-t-[2rem] shadow-inner shrink-0 z-40">
            <a href="index.html" class="flex flex-col items-center gap-1 text-slate-400">
                <i data-lucide="home" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase tracking-wider">Home</span>
            </a>
            <a href="riwayat.html" class="flex flex-col items-center gap-1 text-blue-900">
                <i data-lucide="history" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase tracking-wider">Riwayat</span>
            </a>
            <a href="jadwal.html" class="flex flex-col items-center gap-1 text-slate-400">
                <i data-lucide="calendar-check" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase tracking-wider">Jadwal</span>
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const checkHistoryBtn = document.getElementById('checkHistoryBtn');
        const bookingCodeInput = document.getElementById('bookingCodeInput');
        const historyResult = document.getElementById('historyResult');
        const errorMessage = document.getElementById('errorMessage');

        const bookingData = {
            orderId: 'INV/20260223/7728837569271',
            productName: 'Vaksin Meningitis',
            buyerName: 'Ahmad Zaky',
            buyerWa: '081234567890',
            participantCount: 2,
            participants: ['Ahmad Zaky', 'Siti Aminah'],
            totalPrice: 700000,
            paymentStatus: 'Belum Dibayar'
        };

        function formatIDR(num) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num);
        }

        checkHistoryBtn.addEventListener('click', () => {
            const inputCode = bookingCodeInput.value;
            
            historyResult.classList.add('hidden');
            errorMessage.classList.add('hidden');

            if (inputCode === '569271') {
                historyResult.innerHTML = `
                    <h2 class="font-extrabold text-slate-800 mb-4 text-lg">Detail Pesanan</h2>
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-md space-y-4">
                        <div class="flex justify-between items-center"><span class="text-xs text-slate-500 font-semibold">Order ID</span><span class="text-xs font-bold text-blue-900 bg-blue-100 px-2 py-1 rounded-md">${bookingData.orderId}</span></div>
                        <div class="h-[1px] bg-slate-100"></div>
                        <div class="flex justify-between items-center"><span class="text-xs text-slate-500 font-semibold">Nama Produk</span><span class="text-xs font-bold text-slate-800">${bookingData.productName}</span></div>
                        <div class="flex justify-between items-center"><span class="text-xs text-slate-500 font-semibold">Nama Pembeli</span><span class="text-xs font-bold text-slate-800">${bookingData.buyerName}</span></div>
                        <div class="flex justify-between items-center"><span class="text-xs text-slate-500 font-semibold">No. WA Pembeli</span><span class="text-xs font-bold text-slate-800">${bookingData.buyerWa}</span></div>
                        <div class="flex justify-between items-center"><span class="text-xs text-slate-500 font-semibold">Jumlah Peserta</span><span class="text-xs font-bold text-slate-800">${bookingData.participantCount} Orang</span></div>
                        <div class="h-[1px] bg-slate-100"></div>
                        <div>
                            <span class="text-xs text-slate-500 font-semibold mb-2 block">Daftar Peserta</span>
                            <ul class="list-decimal list-inside space-y-1">
                                ${bookingData.participants.map(p => `<li class="text-xs font-bold text-slate-800">${p}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="h-[1px] bg-slate-100"></div>
                        <div class="flex justify-between items-center"><span class="text-sm text-slate-500 font-bold">Total Harga</span><span class="text-lg font-black text-blue-900">${formatIDR(bookingData.totalPrice)}</span></div>
                        <div class="h-[1px] bg-slate-100"></div>
                        <div class="flex justify-between items-center"><span class="text-xs text-slate-500 font-semibold">Status Pembayaran</span><span class="text-xs font-bold text-orange-800 bg-orange-100 px-2 py-1 rounded-md">${bookingData.paymentStatus}</span></div>
                    </div>
                `;
                historyResult.classList.remove('hidden');
            } else {
                errorMessage.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
